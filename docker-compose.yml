services:
  postgres:
    image: postgres:16-alpine
    container_name: fundamentos01-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: fundamentos01_prod
      POSTGRES_USER: fundamentos_user
      POSTGRES_PASSWORD: fundamentos_password
    ports:
      - "5434:5432"
    volumes:
      - fundamentos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundamentos_user -d fundamentos01_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fundamentos01-api
    restart: always
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/fundamentos01_prod
      DB_USERNAME: fundamentos_user
      DB_PASSWORD: fundamentos_password
      JWT_SECRET: mySecretKeyForJWT2024MustBeAtLeast256BitsLongForHS256Algorithm
      JWT_EXPIRATION: 1800000
      JWT_REFRESH_EXPIRATION: 604800000

      # Para esta práctica se usa update dentro de Docker porque la BD nueva
      # no tiene tablas. En producción real debería usarse validate + migraciones.
      DDL_AUTO: update

      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  fundamentos_postgres_data: